name: Scrape NEPSE Live Prices

on:
  schedule:
    # Runs every 15 min, 05:15-09:15 UTC, Sun-Thu (~11:00-15:00 Nepal time)
    # NEPSE trading hours/days can change — double check and adjust this.
    - cron: "*/15 5-9 * * 0-4"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scraper/scrape_nepse.py
